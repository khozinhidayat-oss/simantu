<div class="d-flex">
    <div id="sidebar-container"></div>
    
    <div class="main-content flex-grow-1" id="main-wrapper">
        <div id="navbar-container"></div>
        
        <div class="container-fluid p-4" style="margin-top: 60px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold text-dark mb-1">Data Guru</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="#" onclick="loadPage('dashboard')" class="text-decoration-none">Dashboard</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Data Guru</li>
                        </ol>
                    </nav>
                </div>
                <button class="btn btn-primary rounded-3 shadow-sm px-4" onclick="showModalGuru()">
                    <i class="fas fa-plus me-2"></i>Tambah Guru
                </button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-bottom pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Daftar Guru</h5>
                    <div class="input-group" style="width: 250px;">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-start-0 ps-0" id="searchGuru" placeholder="Cari guru...">
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="tableGuru">
                            <thead class="table-light text-muted small text-uppercase">
                                <tr>
                                    <th class="ps-4 py-3" width="5%">No</th>
                                    <th class="py-3">Nama Guru</th>
                                    <th class="py-3">NIP</th>
                                    <th class="py-3">Kontak</th>
                                    <th class="py-3">Status</th>
                                    <th class="pe-4 py-3 text-end">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="guruTableBody" class="border-top-0">
                                <tr><td colspan="6" class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white border-top py-3 px-4 d-flex justify-content-between align-items-center">
                    <span class="text-muted small" id="guruTotalData">Menampilkan 0 data</span>
                    <nav aria-label="Page navigation">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item disabled"><a class="page-link" href="#">Sebelumnya</a></li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item disabled"><a class="page-link" href="#">Selanjutnya</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
            
            <div id="footer-container" class="mt-4"></div>
        </div>
    </div>
</div>

<!-- Modal Form Guru -->
<div class="modal fade" id="modalGuru" tabindex="-1" aria-labelledby="modalGuruLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-bottom px-4 py-3">
                <h5 class="modal-title fw-bold" id="modalGuruLabel">Tambah Guru Baru</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-light bg-opacity-50">
                <form id="formGuru">
                    <input type="hidden" id="guruId">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">NIP <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="guruNip" required placeholder="Contoh: 198501012010011001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Nama Lengkap & Gelar <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="guruNama" required placeholder="Contoh: Ahmad Guru, S.Pd">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Jenis Kelamin <span class="text-danger">*</span></label>
                            <select class="form-select" id="guruJk" required>
                                <option value="">Pilih...</option>
                                <option value="L">Laki-laki</option>
                                <option value="P">Perempuan</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Status <span class="text-danger">*</span></label>
                            <select class="form-select" id="guruStatus" required>
                                <option value="Aktif">Aktif</option>
                                <option value="Cuti">Cuti</option>
                                <option value="Pensiun">Pensiun</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="guruEmail" required placeholder="Contoh: ahmad@sekolah.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">No HP <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="guruNohp" required placeholder="Contoh: 081234567890">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top p-3 px-4 bg-white">
                <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary rounded-3 px-4 shadow-sm" onclick="simpanGuru()">
                    <i class="fas fa-save me-2"></i>Simpan Guru
                </button>
            </div>
        </div>
    </div>
</div>

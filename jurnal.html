<div class="d-flex">
    <div id="sidebar-container"></div>
    
    <div class="main-content flex-grow-1" id="main-wrapper">
        <div id="navbar-container"></div>
        
        <div class="container-fluid p-4" style="margin-top: 60px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold text-dark mb-1">Jurnal Mengajar</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="#" onclick="loadPage('dashboard')" class="text-decoration-none">Dashboard</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Jurnal Mengajar</li>
                        </ol>
                    </nav>
                </div>
                <button class="btn btn-primary rounded-3 shadow-sm px-4" onclick="showModalJurnal()">
                    <i class="fas fa-plus me-2"></i>Isi Jurnal Baru
                </button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-bottom pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Riwayat Jurnal Mengajar</h5>
                    <div class="d-flex gap-2">
                        <input type="month" class="form-control form-control-sm bg-light border-0" id="filterBulanJurnal" onchange="filterJurnal()">
                        <div class="input-group input-group-sm" style="width: 200px;">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="searchJurnal" placeholder="Cari materi..." onkeyup="filterJurnal()">
                        </div>
                    </div>
                </div>
                
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="tableJurnal">
                            <thead class="table-light text-muted small text-uppercase">
                                <tr>
                                    <th class="ps-4 py-3" width="5%">No</th>
                                    <th class="py-3" width="12%">Tanggal / Jam</th>
                                    <th class="py-3" width="15%">Kelas & Mapel</th>
                                    <th class="py-3" width="23%">Materi Bahasan</th>
                                    <th class="py-3" width="25%">Aktivitas & Catatan</th>
                                    <th class="pe-4 py-3 text-end" width="10%">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="jurnalTableBody" class="border-top-0">
                                <tr><td colspan="6" class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>Memuat data jurnal...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div id="footer-container" class="mt-4"></div>
        </div>
    </div>
</div>

<!-- Modal Form Jurnal -->
<div class="modal fade" id="modalJurnal" tabindex="-1" aria-labelledby="modalJurnalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-bottom px-4 py-3">
                <h5 class="modal-title fw-bold" id="modalJurnalLabel">Isi Jurnal Mengajar</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-light bg-opacity-50">
                <form id="formJurnal">
                    <input type="hidden" id="jurnalId">
                    
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Tanggal Mengajar <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="jurnalTanggal" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Kelas <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="jurnalKelas" required placeholder="Contoh: XII MIPA 1">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Jam Ke- <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="jurnalJamKe" required placeholder="Contoh: 1-2">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Mata Pelajaran <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="jurnalMapel" required placeholder="Contoh: Matematika Peminatan">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Materi Bahasan <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="jurnalMateri" rows="2" required placeholder="Materi yang diajarkan pada sesi ini..."></textarea>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Aktivitas / Kegiatan Pembelajaran <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="jurnalAktivitas" rows="3" required placeholder="Jalannya proses belajar mengajar..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Kendala / Masalah (Opsional)</label>
                            <textarea class="form-control" id="jurnalKendala" rows="2" placeholder="Catat jika ada masalah di kelas..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Saran / Tindak Lanjut (Opsional)</label>
                            <textarea class="form-control" id="jurnalTindakLanjut" rows="2" placeholder="Tindak lanjut untuk pertemuan berikutnya..."></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top p-3 px-4 bg-white">
                <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary rounded-3 px-4 shadow-sm" onclick="simpanJurnal()">
                    <i class="fas fa-save me-2"></i>Simpan Jurnal
                </button>
            </div>
        </div>
    </div>
</div>

<div class="d-flex">
    <div id="sidebar-container"></div>
    
    <div class="main-content flex-grow-1" id="main-wrapper">
        <div id="navbar-container"></div>
        
        <div class="container-fluid p-4" style="margin-top: 60px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold text-dark mb-1">Data Siswa</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="#" onclick="loadPage('dashboard')" class="text-decoration-none">Dashboard</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Data Siswa</li>
                        </ol>
                    </nav>
                </div>
                <button class="btn btn-primary rounded-3 shadow-sm px-4" onclick="showModalSiswa()">
                    <i class="fas fa-plus me-2"></i>Tambah Siswa
                </button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-bottom pt-4 pb-3 px-4 d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <h5 class="fw-bold mb-0">Daftar Siswa</h5>
                    <div class="d-flex gap-2">
                        <select class="form-select bg-light border-0" id="filterKelasSiswa" style="width: 150px;">
                            <option value="">Semua Kelas</option>
                            <option value="X IPA 1">X IPA 1</option>
                            <option value="X IPA 2">X IPA 2</option>
                        </select>
                        <div class="input-group" style="width: 200px;">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="searchSiswa" placeholder="Cari siswa...">
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="tableSiswa">
                            <thead class="table-light text-muted small text-uppercase">
                                <tr>
                                    <th class="ps-4 py-3" width="5%">No</th>
                                    <th class="py-3">NIS/NISN</th>
                                    <th class="py-3">Nama Siswa</th>
                                    <th class="py-3">JK</th>
                                    <th class="py-3">Kelas</th>
                                    <th class="py-3">Status</th>
                                    <th class="pe-4 py-3 text-end">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="siswaTableBody" class="border-top-0">
                                <tr><td colspan="7" class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div id="footer-container" class="mt-4"></div>
        </div>
    </div>
</div>

<!-- Modal Form Siswa -->
<div class="modal fade" id="modalSiswa" tabindex="-1" aria-labelledby="modalSiswaLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-bottom px-4 py-3">
                <h5 class="modal-title fw-bold" id="modalSiswaLabel">Tambah Siswa Baru</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-light bg-opacity-50">
                <form id="formSiswa">
                    <input type="hidden" id="siswaId">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">NIS <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="siswaNis" required placeholder="Contoh: 2023001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">NISN <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="siswaNisn" required placeholder="Contoh: 0051234567">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Nama Lengkap <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="siswaNama" required placeholder="Nama Lengkap Siswa">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Jenis Kelamin <span class="text-danger">*</span></label>
                            <select class="form-select" id="siswaJk" required>
                                <option value="">Pilih...</option>
                                <option value="L">Laki-laki</option>
                                <option value="P">Perempuan</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Kelas <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="siswaKelas" required placeholder="Contoh: X IPA 1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Status <span class="text-danger">*</span></label>
                            <select class="form-select" id="siswaStatus" required>
                                <option value="Aktif">Aktif</option>
                                <option value="Pindah">Pindah</option>
                                <option value="Lulus">Lulus</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top p-3 px-4 bg-white">
                <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary rounded-3 px-4 shadow-sm" onclick="simpanSiswa()">
                    <i class="fas fa-save me-2"></i>Simpan Siswa
                </button>
            </div>
        </div>
    </div>
</div>

<div class="d-flex">
    <div id="sidebar-container"></div>
    
    <div class="main-content flex-grow-1" id="main-wrapper">
        <div id="navbar-container"></div>
        
        <div class="container-fluid p-4" style="margin-top: 60px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold text-dark mb-1">Data Mata Pelajaran</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="#" onclick="loadPage('dashboard')" class="text-decoration-none">Dashboard</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Mata Pelajaran</li>
                        </ol>
                    </nav>
                </div>
                <button class="btn btn-primary rounded-3 shadow-sm px-4" onclick="showModalMapel()">
                    <i class="fas fa-plus me-2"></i>Tambah Mapel
                </button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-bottom pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Daftar Mapel</h5>
                    <div class="input-group" style="width: 250px;">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-start-0 ps-0" id="searchMapel" placeholder="Cari mapel...">
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="tableMapel">
                            <thead class="table-light text-muted small text-uppercase">
                                <tr>
                                    <th class="ps-4 py-3" width="5%">No</th>
                                    <th class="py-3">Kode</th>
                                    <th class="py-3">Mata Pelajaran</th>
                                    <th class="py-3 text-center">Fase / Semester</th>
                                    <th class="py-3 text-center">KKM</th>
                                    <th class="py-3 text-center">Alokasi Jam</th>
                                    <th class="pe-4 py-3 text-end">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="mapelTableBody" class="border-top-0">
                                <tr><td colspan="7" class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div id="footer-container" class="mt-4"></div>
        </div>
    </div>
</div>

<!-- Modal Form Mapel -->
<div class="modal fade" id="modalMapel" tabindex="-1" aria-labelledby="modalMapelLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-bottom px-4 py-3">
                <h5 class="modal-title fw-bold" id="modalMapelLabel">Tambah Mapel Baru</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-light bg-opacity-50">
                <form id="formMapel">
                    <input type="hidden" id="mapelId">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Kode Mapel <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="mapelKode" required placeholder="Contoh: MTK-W">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Nama Mapel <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="mapelNama" required placeholder="Contoh: Matematika Wajib">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Fase <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="mapelFase" required placeholder="Contoh: E">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Semester <span class="text-danger">*</span></label>
                            <select class="form-select" id="mapelSemester" required>
                                <option value="Ganjil">Ganjil</option>
                                <option value="Genap">Genap</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">KKM <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="mapelKkm" required placeholder="Contoh: 75">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Alokasi Jam (JP) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="mapelJam" required placeholder="Contoh: 4">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Status <span class="text-danger">*</span></label>
                            <select class="form-select" id="mapelStatus" required>
                                <option value="Aktif">Aktif</option>
                                <option value="Tidak Aktif">Tidak Aktif</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top p-3 px-4 bg-white">
                <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary rounded-3 px-4 shadow-sm" onclick="simpanMapel()">
                    <i class="fas fa-save me-2"></i>Simpan Mapel
                </button>
            </div>
        </div>
    </div>
</div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        if(typeof initTheme === 'function') initTheme();
        var sessionId = localStorage.getItem('simengajar_session_id');
        if(sessionId) {
            if(typeof google !== 'undefined' && google.script) {
                showLoading('Memeriksa sesi...');
                google.script.run
                    .withSuccessHandler(function(res) {
                        hideLoading();
                        if(res.success) {
                            currentUser = res.session;
                            loadPage('dashboard');
                        } else {
                            localStorage.removeItem('simengajar_session_id');
                            currentUser = null;
                            if(document.getElementById('app')) if(document.getElementById('app')) if(document.getElementById('app')) document.getElementById('app').innerHTML = `<?!= include('login'); ?>`;
                            if (typeof initLogin === 'function') initLogin();
                        }
                    })
                    .withFailureHandler(function(err) {
                        hideLoading();
                        if(document.getElementById('app')) if(document.getElementById('app')) if(document.getElementById('app')) document.getElementById('app').innerHTML = `<?!= include('login'); ?>`;
                        if (typeof initLogin === 'function') initLogin();
                    })
                    .checkSession(sessionId);
            } else {
                if(document.getElementById('app')) if(document.getElementById('app')) document.getElementById('app').innerHTML = `<?!= include('login'); ?>`;
                if (typeof initLogin === 'function') initLogin();
            }
        } else {
            if(document.getElementById('app')) if(document.getElementById('app')) if(document.getElementById('app')) document.getElementById('app').innerHTML = `<?!= include('login'); ?>`;
            if (typeof initLogin === 'function') initLogin();
        }
      });
    </script>
